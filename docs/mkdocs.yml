site_name: Nexus documentation
repo_name: kbntx-org/nexus
repo_url: https://github.com/kbntx-org/nexus
site_url: https://docs.kbntx.com

docs_dir: src

# Extensions
markdown_extensions: []

theme:
  name: material
  logo: https://fsn1.your-objectstorage.com/nexus-public-statics/images/kt-logo.jpg
  features:
    - tabs
    - instant
    - navigation.tabs

  palette:
    - media: '(prefers-color-scheme)'
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    - media: '(prefers-color-scheme: light)'
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

  include_sidebar: true

plugins: []

extra_css: [assets/extra.css]

watch:
  - src
  - mkdocs.yml
