apiVersion: apps/v1
kind: Deployment
metadata:
  name: documentation
  labels:
    app: documentation
spec:
  replicas: {{ .Values.replicas | default 2 }}
  selector:
    matchLabels:
      app: documentation
  template:
    metadata:
      labels:
        app: documentation
    spec:
      containers:
        - name: documentation
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.containerPort | default 80 }}
          {{- with .Values.resources }}
          {{- if or .requests .limits }}
          resources:
            {{- with .requests }}
            requests:
              {{- if .memory }}
              memory: {{ .memory }}
              {{- end }}
              {{- if .cpu }}
              cpu: {{ .cpu }}
              {{- end }}
            {{- end }}
            {{- with .limits }}
            limits:
              {{- if .memory }}
              memory: {{ .memory }}
              {{- end }}
              {{- if .cpu }}
              cpu: {{ .cpu }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: documentation-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: documentation
---
apiVersion: v1
kind: Service
metadata:
  name: documentation-service
  labels:
    app: documentation
spec:
  selector:
    app: documentation
  ports:
    - port: {{ .Values.containerPort | default 80 }}
      targetPort: {{ .Values.containerPort | default 80 }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: documentation-ingress
spec:
  ingressClassName: traefik
  rules:
    {{- $ingressHosts := .Values.ingressHosts }}
    {{- range $host := $ingressHosts }}
    {{- if $host }}
    - host: {{ $host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: documentation-service
                port:
                  number: {{ $.Values.containerPort | default 80 }}
    {{- end }}
    {{- end }}
