apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-studio
  labels:
    app: supabase-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-studio
  template:
    metadata:
      labels:
        app: supabase-studio
    spec:
      containers:
        - name: studio
          image: supabase/studio:2025.06.30-sha-6f5982d
          ports:
            - containerPort: 3000
          env:
            - name: STUDIO_PG_META_URL
              value: "http://supabase-meta:8080"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbPassword

            - name: DEFAULT_ORGANIZATION_NAME
              value: "kbntx"
            - name: DEFAULT_PROJECT_NAME
              value: "main"

            - name: SUPABASE_URL
              value: "http://supabase-kong:8000"
            - name: SUPABASE_PUBLIC_URL
              value: "http://supabase.kbntx.com"
            - name: SUPABASE_ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: anonKey
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: serviceRoleKey
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwtSecret
          readinessProbe:
            httpGet:
              path: /api/platform/profile
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: supabase-studio
  labels:
    app: supabase-studio
spec:
  selector:
    app: supabase-studio
  ports:
    - port: 3000
      targetPort: 3000
      name: http

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supabase-studio
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: studio-supabase.kbntx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: supabase-studio
                port:
                  number: 3000
