apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-storage
  labels:
    app: supabase-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-storage
  template:
    metadata:
      labels:
        app: supabase-storage
    spec:
      containers:
        - name: storage
          image: supabase/storage-api:v1.25.7
          ports:
            - containerPort: 5000
          env:
            - name: GLOBAL_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: s3Endpoint
            - name: GLOBAL_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: s3Bucket
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: s3AccessKeyId
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: s3SecretAccessKey
            - name: AWS_REGION
              value: stub
            - name: GLOBAL_S3_PROTOCOL
              value: https
            - name: GLOBAL_S3_FORCE_PATH_STYLE
              value: "true"
            - name: ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: anonKey
            - name: SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: serviceRoleKey
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwtSecret
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbUrlStorage
            - name: FILE_SIZE_LIMIT
              value: "52428800"
            - name: STORAGE_BACKEND
              value: "s3"
            - name: REGION
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: AWS_DEFAULT_REGION
            - name: GLOBAL_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: GLOBAL_S3_BUCKET
            # Optional image transformation
            - name: ENABLE_IMAGE_TRANSFORMATION
              value: "false"
            - name: IMGPROXY_URL
              value: "http://supabase-imgproxy:5001"

          readinessProbe:
            httpGet:
              path: /status
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: supabase-storage
  labels:
    app: supabase-storage
spec:
  selector:
    app: supabase-storage
  ports:
    - port: 5000
      targetPort: 5000
      name: http
