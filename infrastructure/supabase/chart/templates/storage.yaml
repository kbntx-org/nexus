apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-storage
  labels:
    app: supabase-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-storage
  template:
    metadata:
      labels:
        app: supabase-storage
    spec:
      containers:
        - name: storage
          image: supabase/storage-api:v1.25.7
          ports:
            - containerPort: 5000
          env:
            # Supabase keys
            - name: ANON_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: ANON_KEY
            - name: SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: SERVICE_ROLE_KEY
            - name: PGRST_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-db-credentials
                  key: url

            # Storage config
            - name: FILE_SIZE_LIMIT
              value: "52428800"
            - name: STORAGE_BACKEND
              value: "s3"
            - name: REGION
              valueFrom:
                secretKeyRef:
                  name: supabase-s3-credentials
                  key: AWS_DEFAULT_REGION
            - name: GLOBAL_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: supabase-s3-credentials
                  key: GLOBAL_S3_BUCKET

            # AWS creds
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: supabase-s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-s3-credentials
                  key: AWS_SECRET_ACCESS_KEY

            # Optional image transformation
            - name: ENABLE_IMAGE_TRANSFORMATION
              value: "true"
            - name: IMGPROXY_URL
              value: "http://supabase-imgproxy:5001"

          readinessProbe:
            httpGet:
              path: /status
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: supabase-storage
  labels:
    app: supabase-storage
spec:
  selector:
    app: supabase-storage
  ports:
    - port: 5000
      targetPort: 5000
      name: http
