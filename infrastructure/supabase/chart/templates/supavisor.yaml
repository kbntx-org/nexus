apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-supavisor
  labels:
    app: supabase-supavisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-supavisor
  template:
    metadata:
      labels:
        app: supabase-supavisor
    spec:
      containers:
        - name: supavisor
          image: supabase/supavisor:2.5.7
          ports:
            - containerPort: 5432   # main Postgres proxy
            - containerPort: 6543   # transaction pooler
          env:
            - name: PORT
              value: "4000"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbName
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbPassword
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbUrlEcto

            - name: CLUSTER_POSTGRES
              value: "true"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: secretKeyBase
            - name: VAULT_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: vaultEncryptionKey

            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwtSecret
            - name: METRICS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwtSecret

            - name: REGION
              value: "local"
            - name: ERL_AFLAGS
              value: "-proto_dist inet_tcp"

            - name: POOLER_TENANT_ID
              value: "default"
            - name: POOLER_DEFAULT_POOL_SIZE
              value: "20"
            - name: POOLER_MAX_CLIENT_CONN
              value: "100"
            - name: POOLER_POOL_MODE
              value: "transaction"
            - name: DB_POOL_SIZE
              value: "20"

          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: supabase-supavisor
  labels:
    app: supabase-supavisor
spec:
  selector:
    app: supabase-supavisor
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: pooler
      port: 6543
      targetPort: 6543
