kube-prometheus-stack:
  prometheus:
    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: hcloud-volumes
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 10Gi

  grafana:
    grafana.ini:
      server:
        domain: grafana.kbntx.com
        root_url: 'https://%(domain)s/'
      auth:
        disable_login: true
        disable_login_form: true
    persistence:
      type: pvc
      enabled: true
      storageClassName: hcloud-volumes
      accessModes:
        - ReadWriteOnce
      size: 10Gi
    sidecar:
      dashboards:
        provider:
          allowUiUpdates: true
