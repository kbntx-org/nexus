ingress-nginx:
  controller:
    service:
      type: ClusterIP
    config:
      proxy-real-ip-cidr: '10.0.0.0/16,103.21.244.0/22,103.22.200.0/22,103.31.4.0/22,104.16.0.0/13,104.24.0.0/14,108.162.192.0/18,131.0.72.0/22,141.101.64.0/18,162.158.0.0/15,172.64.0.0/13,173.245.48.0/20,188.114.96.0/20,190.93.240.0/20,197.234.240.0/22,198.41.128.0/17,2400:cb00::/32,2606:4700::/32,2803:f800::/32,2405:b500::/32,2405:8100::/32,2a06:98c0::/29,2c0f:f248::/32'
      use-forwarded-headers: 'true'
      enable-real-ip: 'true'
      proxy-body-size: 32M
      client-body-buffer-size: 16M
      proxy-buffering: 'on'
      proxy-buffer-size: 128K
      proxy-buffers-number: 32
      proxy-busy-buffers-size: 1M
      log-format-escape-json: 'true'
      log-format-upstream:
        '{"time": "$time_iso8601", "remote_addr": "$remote_addr", "x_forwarded_for": "$proxy_add_x_forwarded_for", "request_id": "$req_id",
        "bytes_sent": $bytes_sent, "request_time": $request_time, "status": $status, "vhost": "$host", "request_proto": "$server_protocol",
        "path": "$uri","duration": $request_time,"method": "$request_method", "http_referrer": "$http_referer",
        "http_user_agent": "$http_user_agent" }'
    replicaCount: 2
    ingressClassResource:
      default: true
