apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
spec:
  serviceName: mongodb-service
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      securityContext:
        fsGroup: 999
      initContainers:
        - name: fix-key-permissions
          image: busybox
          command: ["sh", "-c", "chown 999:999 /etc/mongodb-key/mongoDbKey && chmod 600 /etc/mongodb-key/mongoDbKey"]
          volumeMounts:
            - name: mongodb-key
              mountPath: /etc/mongodb-key
      volumes:
        - name: mongodb-key
          secret:
            secretName: appsmith-secrets
            items:
              - key: mongoDbKey
                path: mongoDbKey
            defaultMode: 0400
      containers:
        - name: mongodb
          image: mongo:8.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: appsmith-secrets
                  key: mongoDbUser
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appsmith-secrets
                  key: mongoDbPassword
            - name: MONGO_INITDB_DATABASE
              valueFrom:
                secretKeyRef:
                  name: appsmith-secrets
                  key: mongoDbName
          args:
            - --replSet
            - rs0
            - --keyFile
            - /etc/mongodb-key/mongoDbKey
            - --bind_ip_all
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
            - name: mongodb-key
              mountPath: /etc/mongodb-key
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: mongodb-data
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 20Gi
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP
