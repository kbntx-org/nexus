name: Compute affected

on:
  workflow_call:
    outputs:
      affected:
        description: 'JSON array of nx-affected project names (drives test/lint gating)'
        value: ${{ jobs.compute.outputs.affected }}
      deploy_targets:
        description: 'JSON array of projects whose code OR deployPaths changed since their last deploy'
        value: ${{ jobs.compute.outputs.deploy_targets }}

jobs:
  compute:
    runs-on: nexus-org-runners
    container:
      image: kbntx/nexus-ci-toolkit:1.0
    timeout-minutes: 5
    defaults:
      run:
        shell: bash
    outputs:
      affected: ${{ steps.affected.outputs.affected }}
      deploy_targets: ${{ steps.deploy_targets.outputs.deploy_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pnpm install

      - name: Resolve refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Always diff against trunk, regardless of the PR's actual base branch
            # (this matters for stacked PRs targeting another feature branch).
            git fetch origin main --depth=1
            echo "mode=pr" >> "$GITHUB_OUTPUT"
            echo "affected_base=remotes/origin/main" >> "$GITHUB_OUTPUT"
          else
            echo "mode=main" >> "$GITHUB_OUTPUT"
            beforeSha="${{ github.event.before }}"
            if [ "$beforeSha" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "$beforeSha" 2>/dev/null; then
              beforeSha=$(git rev-parse HEAD~1)
            fi
            echo "affected_base=$beforeSha" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint manifests-repo read token (main mode only)
        if: steps.refs.outputs.mode == 'main'
        id: manifests_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.NEXUS_MANIFESTS_APP_ID }}
          private-key: ${{ secrets.NEXUS_MANIFESTS_APP_PRIVATE_KEY }}
          owner: kbntx
          repositories: nexus-manifests

      - name: Clone manifests repo (main mode only)
        if: steps.refs.outputs.mode == 'main'
        env:
          MANIFESTS_TOKEN: ${{ steps.manifests_token.outputs.token }}
        run: |
          git clone --depth=1 \
            "https://x-access-token:${MANIFESTS_TOKEN}@github.com/kbntx/nexus-manifests.git" \
            /tmp/nexus-manifests

      - name: Compute affected projects
        id: affected
        env:
          AFFECTED_BASE: ${{ steps.refs.outputs.affected_base }}
        run: |
          affectedProjects=$(pnpm -s nx show projects --affected --base "$AFFECTED_BASE" --json)
          echo "Affected: $affectedProjects"
          echo "affected=$affectedProjects" >> "$GITHUB_OUTPUT"

      - name: Compute deploy targets
        id: deploy_targets
        uses: actions/github-script@v9
        env:
          MODE: ${{ steps.refs.outputs.mode }}
          AFFECTED_BASE: ${{ steps.refs.outputs.affected_base }}
          HEAD_SHA: ${{ github.sha }}
          AFFECTED_PROJECTS: ${{ steps.affected.outputs.affected }}
          MANIFESTS_REPO_PATH: /tmp/nexus-manifests
        with:
          script: |
            const { spawnSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            const run = (cmd, args) => {
              const r = spawnSync(cmd, args, { encoding: 'utf8' });
              if (r.status !== 0) throw new Error(`${cmd} ${args.join(' ')} failed:\n${r.stderr}`);
              return r.stdout.trim();
            };
            const runOk = (cmd, args) =>
              spawnSync(cmd, args, { stdio: 'ignore' }).status === 0;
            const nxProject = (name) =>
              JSON.parse(run('pnpm', ['-s', 'nx', 'show', 'project', name, '--json']));

            const mode = process.env.MODE;
            const affectedBase = process.env.AFFECTED_BASE;
            const headSha = process.env.HEAD_SHA;
            const manifestsRepoPath = process.env.MANIFESTS_REPO_PATH;

            const emptyTree = run('git', ['hash-object', '-t', 'tree', '/dev/null']);
            const allProjects = JSON.parse(run('pnpm', ['-s', 'nx', 'show', 'projects', '--json']));
            const deployTargets = new Set(JSON.parse(process.env.AFFECTED_PROJECTS));

            const changedSinceBase = run('git', ['diff', '--name-only', affectedBase, headSha])
              .split('\n').filter(Boolean);
            if (changedSinceBase.includes('.github/workflows/compute-affected.yml')) {
              core.info('compute-affected.yml changed — marking all applications as deploy targets');
              for (const project of allProjects) {
                if (nxProject(project).projectType === 'application') deployTargets.add(project);
              }
            }

            const compilePattern = (pattern) =>
              new RegExp('^' + pattern.replace(/\./g, '\\.').replace(/\*\*/g, '.*') + '$');

            for (const project of allProjects) {
              const meta = nxProject(project);
              const manifestsValuesPath = meta.metadata?.manifestsValuesPath;
              const deployPaths = meta.metadata?.deployPaths || [];
              if (deployPaths.length === 0) continue;

              let perAppBase;
              if (mode === 'main' && manifestsValuesPath) {
                const valuesFile = path.join(manifestsRepoPath, manifestsValuesPath);
                if (!fs.existsSync(valuesFile)) {
                  perAppBase = emptyTree;
                } else {
                  const deployedTag = run('yq', ['-r', '.image.tag // ""', valuesFile]);
                  const deployedSha = deployedTag.split('-').pop();
                  if (!deployedSha || !runOk('git', ['cat-file', '-e', deployedSha])) {
                    perAppBase = emptyTree;
                  } else if (!runOk('git', ['merge-base', '--is-ancestor', deployedSha, headSha])) {
                    core.info(`Skipping ${project}: deployed ${deployedSha} is newer or unrelated to ${headSha}`);
                    continue;
                  } else {
                    perAppBase = deployedSha;
                  }
                }
              } else {
                perAppBase = affectedBase;
              }

              const changedFiles = run('git', ['diff', '--name-only', perAppBase, headSha])
                .split('\n').filter(Boolean);
              const matched = deployPaths.some(pattern =>
                changedFiles.some(file => compilePattern(pattern).test(file))
              );
              if (matched) deployTargets.add(project);
            }

            const result = Array.from(deployTargets);
            core.info('Deploy targets: ' + JSON.stringify(result));
            core.setOutput('deploy_targets', JSON.stringify(result));
