name: Compute affected

on:
  workflow_call:
    outputs:
      affected:
        description: 'JSON array of nx-affected project names (drives test/lint gating)'
        value: ${{ jobs.compute.outputs.affected }}
      deploy_targets:
        description: 'JSON array of projects whose code OR deployPaths changed (drives deploy gating)'
        value: ${{ jobs.compute.outputs.deploy_targets }}

jobs:
  compute:
    runs-on: nexus-runners
    container:
      image: kbntx/nexus-ci-toolkit:1.0
    timeout-minutes: 5
    outputs:
      affected: ${{ steps.affected.outputs.affected }}
      deploy_targets: ${{ steps.deploy_targets.outputs.deploy_targets }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: pnpm install

      - name: Resolve refs
        id: refs
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin "${{ github.base_ref }}" --depth=1
            echo "base=remotes/origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
            echo "build_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "build_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute affected projects
        id: affected
        run: |
          affectedProjects=$(pnpm -s nx show projects --affected --base "${{ steps.refs.outputs.base }}" --json)
          echo "Affected: $affectedProjects"
          echo "affected=$affectedProjects" >> "$GITHUB_OUTPUT"

      - name: Compute deploy targets
        id: deploy_targets
        run: |
          changedFiles=$(git diff --name-only "${{ steps.refs.outputs.base }}" "${{ github.sha }}")
          echo "Changed files:"
          echo "$changedFiles"

          deployTargets='${{ steps.affected.outputs.affected }}'
          allProjects=$(pnpm -s nx show projects --json)

          if echo "$changedFiles" | grep -qx '\.github/workflows/compute-affected\.yml'; then
            echo "compute-affected.yml changed â€” marking all applications as deploy targets"
            allApplications='[]'
            for project in $(echo "$allProjects" | jq -r '.[]'); do
              projectType=$(pnpm -s nx show project "$project" --json | jq -r '.projectType // ""')
              if [ "$projectType" = "application" ]; then
                allApplications=$(echo "$allApplications" | jq -c --arg p "$project" '. + [$p]')
              fi
            done
            deployTargets=$(echo "$deployTargets $allApplications" | jq -cs 'add | unique')
          fi

          for project in $(echo "$allProjects" | jq -r '.[]'); do
            matched=$(pnpm -s nx show project "$project" --json \
              | jq -r '.metadata.deployPaths // [] | .[]' \
              | while read -r pattern; do
                  [ -z "$pattern" ] && continue
                  regex=$(echo "$pattern" | sed -e 's|/\*\*|/.*|g' -e 's|\.|\\.|g')
                  if echo "$changedFiles" | grep -qE "^${regex}$"; then
                    echo yes
                    break
                  fi
                done)
            if [ "$matched" = "yes" ]; then
              deployTargets=$(echo "$deployTargets" | jq -c --arg p "$project" '. + [$p] | unique')
            fi
          done

          echo "Deploy targets: $deployTargets"
          echo "deploy_targets=$deployTargets" >> "$GITHUB_OUTPUT"

      - name: Build manifest
        run: |
          jq -n \
            --arg sha "${{ steps.refs.outputs.build_sha }}" \
            --arg mergeSha "${{ github.sha }}" \
            --arg ref "${{ github.ref }}" \
            --argjson affected '${{ steps.affected.outputs.affected }}' \
            --argjson deployTargets '${{ steps.deploy_targets.outputs.deploy_targets }}' \
            '{sha: $sha, merge_sha: $mergeSha, ref: $ref, affected: $affected, deploy_targets: $deployTargets}' \
            > affected-${{ steps.refs.outputs.build_sha }}.json
          cat affected-${{ steps.refs.outputs.build_sha }}.json

      - name: Upload manifest
        uses: actions/upload-artifact@v4
        with:
          name: affected-${{ steps.refs.outputs.build_sha }}
          path: affected-${{ steps.refs.outputs.build_sha }}.json
