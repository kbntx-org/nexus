name: Deploy portfolio

on:
  push:
    branches: [main]
  workflow_call:

concurrency:
  group: deploy-portfolio

jobs:
  build-and-deploy:
    runs-on: nexus-runners
    container:
      image: kbntx/nexus-ci-toolkit:1.0
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build portfolio frontend
        run: pnpm nx build portfolio --configuration=production

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: ./.github/actions/buildkit-and-push
        with:
          context: .
          file: apps/portfolio/Dockerfile
          tag: kbntx/portfolio:latest

      - name: Deploy
        env:
          ARGOCD_SERVER: argocd.kbntx.com
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_TOKEN }}
          ARGOCD_OPTS: '--grpc-web'
        run: |
          argocd app sync portfolio --prune
          argocd app wait portfolio --sync --health --operation --timeout 500
          argocd app actions run portfolio restart --kind Deployment --resource-name portfolio --namespace portfolio
