name: Deploy portfolio

on:
  push:
    branches: [main]

concurrency:
  group: deploy-portfolio

jobs:
  build-and-deploy:
    runs-on: nexus-runners
    container:
      image: kbntx/nexus-ci-toolkit:1.0
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: "10.14.0"

      - name: Install dependencies
        run: pnpm install

      - name: Build portfolio frontend
        run: pnpm nx build portfolio-frontend --configuration=production

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: ./.github/actions/buildkit-and-push
        with:
          context: .
          file: apps/portfolio/frontend/Dockerfile
          push: true
          tags: kbntx/portfolio:latest
