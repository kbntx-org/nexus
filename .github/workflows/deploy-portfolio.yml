name: Deploy portfolio

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: deploy-portfolio

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Check if portfolio changed
        uses: dorny/paths-filter@v2
        id: changes
        with:
          filters: |
            portfolio:
              - 'apps/portfolio/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install

      - name: Build portfolio frontend
        run: pnpm nx build portfolio-frontend --configuration=production

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/portfolio/frontend/Dockerfile
          push: true
          tags: kbntx/portfolio:latest
