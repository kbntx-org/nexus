name: Lint & Format PR

on:
  workflow_call:

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: nexus-runners
    container:
      image: kbntx/nexus-ci-toolkit:1.0
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Fetch base branch
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
        shell: bash

      - name: Install dependencies
        run: |
          pnpm install
        shell: bash

      - name: Check formatting
        run: pnpm nx format:check --base remotes/origin/${{ github.base_ref }}
        shell: bash

      - name: Lint
        run: |
          pnpm nx affected:lint --parallel --base remotes/origin/${{ github.base_ref }}
        shell: bash
