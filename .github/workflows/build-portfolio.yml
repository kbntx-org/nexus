name: Build portfolio image

on:
  workflow_call:
    inputs:
      image_tag:
        description: 'Image tag to build and push'
        required: true
        type: string
    outputs:
      image_tag:
        description: 'The tag actually pushed (echoes input)'
        value: ${{ jobs.build.outputs.image_tag }}

concurrency:
  group: build-portfolio-${{ inputs.image_tag }}

jobs:
  build:
    runs-on: nexus-runners
    container:
      image: kbntx/nexus-ci-toolkit:1.0
    timeout-minutes: 10
    outputs:
      image_tag: ${{ inputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pnpm install

      - name: Build portfolio frontend
        run: pnpm nx build portfolio --configuration=production

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Build and push Docker image
        uses: ./.github/actions/buildkit-and-push
        with:
          context: .
          file: apps/portfolio/Dockerfile
          tag: kbntx/portfolio:${{ inputs.image_tag }}
