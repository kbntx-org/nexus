name: Test main

on:
  workflow_call:

jobs:
  test:
    name: Test
    runs-on: nexus-runners
    container:
      image: kbntx/nexus-ci-toolkit:1.0
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: pnpm install
        shell: bash

      - name: Test
        run: pnpm nx run-many --target=test --all --parallel
        shell: bash
