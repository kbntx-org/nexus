name: Build and Push Docker Images

on:
  workflow_dispatch:

jobs:
  build-docker-images:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Buildkit rootless - build and push
        uses: ./.github/actions/mirror-docker-image
        with:
          source-image: moby/buildkit:v0.24.0-rootless
          target-tags: kbntx/buildkit:v0.24.0-rootless
          platforms: linux/amd64

      - name: docker-cli-with-node - build and push
        uses: docker/build-push-action@v6
        with:
          context: platform/custom-docker-images/docker-cli-with-node
          file: platform/custom-docker-images/docker-cli-with-node/Dockerfile
          push: true
          tags: |
            kbntx/docker-cli-with-node:22.16.0
          platforms: linux/amd64

      - name: kubernetes-cli-with-node - build and push
        uses: docker/build-push-action@v6
        with:
          context: platform/custom-docker-images/kubernetes-cli-with-node
          file: platform/custom-docker-images/kubernetes-cli-with-node/Dockerfile
          push: true
          tags: |
            kbntx/kubernetes-cli-with-node:22.16.0
          platforms: linux/amd64
