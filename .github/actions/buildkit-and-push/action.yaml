name: 'Buildkit and push'
description: 'Build and push Docker images using buildctl in Kubernetes'
inputs:
  tag:
    description: 'Image tag'
    required: true
  file:
    description: 'Path to Dockerfile'
    required: true
  context:
    description: 'Build context path'
    required: true
runs:
  using: 'composite'
  steps:
    - name: Build with buildctl
      shell: bash
      run: |
        set -euo pipefail

        CONTEXT="${{ inputs.context }}"
        DOCKERFILE_INPUT="${{ inputs.file }}"

        if [ ! -d "$CONTEXT" ]; then
          echo "Error: build context '$CONTEXT' does not exist."
          exit 1
        fi

        if [ -f "$DOCKERFILE_INPUT" ]; then
          DOCKERFILE_PATH="$DOCKERFILE_INPUT"
        elif [ -f "$CONTEXT/$DOCKERFILE_INPUT" ]; then
          DOCKERFILE_PATH="$CONTEXT/$DOCKERFILE_INPUT"
        else
          echo "Error: Dockerfile '$DOCKERFILE_INPUT' not found."
          echo "Checked:"
          echo "  - $DOCKERFILE_INPUT"
          echo "  - $CONTEXT/$DOCKERFILE_INPUT"
          exit 1
        fi

        DOCKERFILE_DIR=$(dirname "$DOCKERFILE_PATH")
        DOCKERFILE_NAME=$(basename "$DOCKERFILE_PATH")

        buildctl build \
          --frontend=dockerfile.v0 \
          --local context="$CONTEXT" \
          --local dockerfile="$DOCKERFILE_DIR" \
          --opt filename="$DOCKERFILE_NAME" \
          --output type=image,name="${{ inputs.tag }}",push=true
