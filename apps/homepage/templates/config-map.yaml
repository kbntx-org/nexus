apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  labels:
    app: homepage
data:
  kubernetes.yaml: |
    mode: cluster
  settings.yaml: |
    title: Person's Homepage # Replaced by widget in this example.
    headerStyle: clean
    background:
      image: https://wallpapercave.com/wp/wp4565843.jpg
      blur: md # sm, md, xl... see https://tailwindcss.com/docs/backdrop-blur
      saturate: 50 # 0, 50, 100... see https://tailwindcss.com/docs/backdrop-saturate
      brightness: 50 # 0, 50, 75... see https://tailwindcss.com/docs/backdrop-brightness
      opacity: 70 # 0-100
    theme: dark
    color: slate
    useEqualHeights: true
    quicklaunch:
      searchDescriptions: true
      hideInternetSearch: true
      showSearchSuggestions: true
      hideVisitURL: true
    hideVersion: false
    layout:
      Bookmarks:
        header: false
        style: row
        columns: 2
      Calendar:
        header: false
        style: column
      Infrastructure:
        header: true
        style: row
        columns: 4
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: |
    - Bookmarks:
        - YouTube:
            - icon: youtube.svg
              href: https://youtube.com
              description: Video Monopoly
  services.yaml: |
    - Calendar:
        - Media Calendar:
            widget:
              type: calendar
              firstDayInWeek: monday
              view: monthly
              maxEvents: 10
              showTime: true
    - Infrastructure:
        - K3S Cluster:
            widget:
              type: kubernetes
              cluster:
                show: true
                cpu: true
                memory: true
                showLabel: true
  widgets.yaml: |
    - openmeteo:
        label: Your City
        lattitude: 00.123
        longitude: 00.123
        timezone: TZ # America/Chicago, UTC, etc.
        units: imperial
        cache: 5
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "K3S Cluster"
        nodes:
          show: false
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
        focus: true
        showSearchSuggestions: true
  docker.yaml: ""
