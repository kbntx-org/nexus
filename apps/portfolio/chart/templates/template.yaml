apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  labels:
    app: portfolio
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
        - name: portfolio
          image: kbntx/portfolio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          {{- with .Values.resources }}
          {{- if or .requests .limits }}
          resources:
            {{- with .requests }}
            requests:
              {{- if .memory }}
              memory: {{ .memory }}
              {{- end }}
              {{- if .cpu }}
              cpu: {{ .cpu }}
              {{- end }}
            {{- end }}
            {{- with .limits }}
            limits:
              {{- if .memory }}
              memory: {{ .memory }}
              {{- end }}
              {{- if .cpu }}
              cpu: {{ .cpu }}
              {{- end }}
            {{- end }}
          {{- end }}
          {{- end }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: portfolio-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: portfolio
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio-service
  labels:
    app: portfolio
spec:
  selector:
    app: portfolio
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: portfolio-ingress
spec:
  rules:
    - host: portfolio.kbntx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: portfolio-service
                port:
                  number: 80
