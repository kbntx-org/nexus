<div class="min-h-screen bg-background text-foreground py-12 md:py-8">
  <div class="max-w-6xl mx-auto px-4">
    <div class="text-center mb-12">
      <h1 class="text-4xl sm:text-5xl lg:text-6xl font-bold text-foreground mb-6">Skills & Technologies</h1>
      <p class="text-lg sm:text-xl text-muted-foreground max-w-3xl mx-auto">My technical expertise and the tools I use to bring ideas to life</p>
    </div>

    <section class="relative min-h-[600px] overflow-hidden" #skillsSection>
      <div class="skills-particles relative w-full h-[500px] max-w-full overflow-hidden">
        <div
          class="particle absolute flex items-center justify-center w-20 h-20 bg-card/60 backdrop-blur-sm border border-border/40 rounded-full shadow-lg transition-all duration-300 cursor-pointer opacity-90 hover:scale-110 hover:opacity-100 hover:bg-card/80 hover:border-primary/50 hover:shadow-xl hover:z-10"
          *ngFor="let skill of skills; let i = index"
          [style.animation-delay]="i * 0.5 + 's'"
          [style.animation-duration]="8 + i * 2 + 's'"
        >
          <div class="particle-icon text-3xl transition-transform duration-300 group-hover:scale-110" [class]="getSkillIconClass(skill.name)">
            {{ getSkillIcon(skill.name) }}
          </div>
        </div>
      </div>
    </section>
  </div>
</div>
