<nav class="fixed top-0 left-0 right-0 z-40 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700">
  <div class="max-w-6xl mx-auto px-4 flex items-center justify-between h-16 lg:h-[70px] gap-4">
    <div class="flex items-center">
      <a routerLink="/" class="flex items-center gap-2 text-gray-900 dark:text-white font-bold text-xl">
        <span class="text-2xl">👨‍💻</span>
        <span class="hidden sm:block bg-gradient-to-r from-[#667eea] to-[#764ba2] bg-clip-text text-transparent">Kenny</span>
      </a>
    </div>

    <div class="hidden lg:flex items-center gap-8">
      @for (item of navigationItems; track item) {
        <a
          [routerLink]="item.path"
          routerLinkActive="text-[#667eea] dark:text-[#667eea] font-semibold bg-gradient-to-r from-[#667eea]/10 to-[#764ba2]/10 dark:from-[#667eea]/20 dark:to-[#764ba2]/20"
          class="flex items-center gap-2 text-gray-600 dark:text-gray-300 font-medium px-4 py-2 rounded-lg transition-all duration-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800"
          >
          <span class="text-lg">{{ item.icon }}</span>
          <span class="text-sm">{{ item.label }}</span>
        </a>
      }
    </div>

    <div class="flex items-center gap-4">
      <div class="hidden lg:block">
        <app-theme-toggle></app-theme-toggle>
      </div>

      <div class="lg:hidden">
        <app-theme-toggle></app-theme-toggle>
      </div>

      <button
        class="lg:hidden flex flex-col justify-around w-8 h-8 bg-transparent border-none cursor-pointer p-0 relative"
        (click)="toggleMenu()"
        aria-label="Toggle navigation menu"
        >
        <span class="w-full h-0.5 bg-gray-900 dark:bg-white rounded-sm transition-all duration-300 origin-center" [class]="isMenuOpen ? 'rotate-45 translate-y-1.5' : ''"></span>
        <span class="w-full h-0.5 bg-gray-900 dark:bg-white rounded-sm transition-all duration-300" [class]="isMenuOpen ? 'opacity-0' : ''"></span>
        <span class="w-full h-0.5 bg-gray-900 dark:bg-white rounded-sm transition-all duration-300 origin-center" [class]="isMenuOpen ? '-rotate-45 -translate-y-1.5' : ''"></span>
      </button>
    </div>
  </div>

  <div
    class="fixed inset-0 bg-black/50 z-40 transition-all duration-300"
    [class]="isMenuOpen ? 'opacity-100 visible' : 'opacity-0 invisible'"
    (click)="closeMenu()"
  ></div>

  <div
    class="fixed top-0 right-0 w-full h-full bg-white dark:bg-gray-900 border-l border-gray-200 dark:border-gray-700 z-50 transition-all duration-300 flex flex-col shadow-2xl lg:w-80"
    [class]="isMenuOpen ? 'translate-x-0' : 'translate-x-full'"
    >
    <div class="flex items-center justify-between p-4 border-b border-gray-200 dark:border-gray-700">
      <h3 class="text-xl font-semibold text-gray-900 dark:text-white">Menu</h3>
      <button
        class="text-2xl text-gray-500 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 p-2 rounded-md transition-all duration-300"
        (click)="closeMenu()"
        >
        ×
      </button>
    </div>

    <div class="flex-1 p-4 overflow-y-auto">
      @for (item of navigationItems; track item) {
        <a
          [routerLink]="item.path"
          routerLinkActive="text-gray-900 dark:text-white bg-gradient-to-r from-[#667eea]/10 to-[#764ba2]/10 border-l-[#667eea] dark:border-l-[#667eea]"
          class="flex items-center gap-4 px-6 py-4 text-gray-600 dark:text-gray-300 font-medium transition-all duration-300 hover:text-gray-900 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-gray-800 border-l-4 border-transparent"
          (click)="closeMenu()"
          >
          <span class="text-xl w-6 text-center">{{ item.icon }}</span>
          <span class="text-base">{{ item.label }}</span>
        </a>
      }
    </div>
  </div>
</nav>
