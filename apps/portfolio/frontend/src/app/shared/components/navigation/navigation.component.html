<nav
  class="fixed left-0 right-0 top-0 z-40 border-b border-gray-200 bg-white dark:border-gray-700 dark:bg-gray-900"
>
  <div class="mx-auto flex h-16 max-w-6xl items-center justify-between gap-4 px-4 lg:h-[70px]">
    <div class="flex items-center">
      <a
        routerLink="/"
        class="flex items-center gap-2 text-xl font-bold text-gray-900 dark:text-white"
      >
        <img
          src="https://nbg1.your-objectstorage.com/nexus-public-statics/images/kt-logo.jpg"
          alt="Kenny Talbi"
          class="h-10 w-10 flex-shrink-0 object-cover"
        />
        <span
          class="hidden whitespace-nowrap bg-gradient-to-r from-[#667eea] to-[#764ba2] bg-clip-text text-transparent sm:block"
          >Kenny</span
        >
      </a>
    </div>

    <div class="hidden items-center gap-8 lg:flex">
      @for (item of navigationItems; track item) {
        <a
          [routerLink]="item.path"
          routerLinkActive="text-[#667eea] dark:text-[#667eea] font-semibold bg-gradient-to-r from-[#667eea]/10 to-[#764ba2]/10 dark:from-[#667eea]/20 dark:to-[#764ba2]/20"
          class="flex items-center gap-2 rounded-lg px-4 py-2 font-medium text-gray-600 transition-all duration-300 hover:bg-gray-100 hover:text-gray-900 dark:text-gray-300 dark:hover:bg-gray-800 dark:hover:text-white"
        >
          <lucide-angular [img]="this[item.icon]" class="h-5 w-5"></lucide-angular>
          <span class="text-sm">{{ item.label }}</span>
        </a>
      }
    </div>

    <div class="flex items-center gap-4">
      <div class="hidden lg:block">
        <app-theme-toggle></app-theme-toggle>
      </div>

      <div class="lg:hidden">
        <app-theme-toggle></app-theme-toggle>
      </div>

      <button
        class="flex h-8 w-8 cursor-pointer items-center justify-center border-none bg-transparent p-0 lg:hidden"
        (click)="toggleMenu()"
        aria-label="Toggle navigation menu"
      >
        <lucide-angular
          [img]="MenuIcon"
          [strokeWidth]="1"
          class="h-9 w-9 text-gray-900 dark:text-white"
        ></lucide-angular>
      </button>
    </div>
  </div>

  <div
    class="fixed inset-0 z-40 bg-black/50 transition-all duration-300"
    [class]="isMenuOpen ? 'visible opacity-100' : 'invisible opacity-0'"
    (click)="closeMenu()"
  ></div>

  <div
    class="fixed right-0 top-0 z-50 flex h-full w-full flex-col border-l border-gray-200 bg-white shadow-2xl transition-all duration-300 lg:w-80 dark:border-gray-700 dark:bg-gray-900"
    [class]="isMenuOpen ? 'translate-x-0' : 'translate-x-full'"
  >
    <div
      class="flex items-center justify-between border-b border-gray-200 p-4 dark:border-gray-700"
    >
      <h3 class="text-xl font-semibold text-gray-900 dark:text-white">Menu</h3>
      <button
        class="rounded-md p-2 text-2xl text-gray-500 transition-all duration-300 hover:bg-gray-100 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-gray-800 dark:hover:text-white"
        (click)="closeMenu()"
      >
        <lucide-angular [img]="XIcon" class="h-5 w-5"></lucide-angular>
      </button>
    </div>

    <div class="flex-1 overflow-y-auto p-4">
      @for (item of navigationItems; track item) {
        <a
          [routerLink]="item.path"
          routerLinkActive="text-gray-900 dark:text-white bg-gradient-to-r from-[#667eea]/10 to-[#764ba2]/10 border-l-[#667eea] dark:border-l-[#667eea]"
          class="flex items-center gap-4 border-l-4 border-transparent px-6 py-4 font-medium text-gray-600 transition-all duration-300 hover:bg-gray-100 hover:text-gray-900 dark:text-gray-300 dark:hover:bg-gray-800 dark:hover:text-white"
          (click)="closeMenu()"
        >
          <lucide-angular [img]="this[item.icon]" class="h-5 w-5"></lucide-angular>
          <span class="text-base">{{ item.label }}</span>
        </a>
      }
    </div>
  </div>
</nav>
