<nav
  class="fixed left-0 right-0 z-40 flex justify-center px-4 bottom-4 sm:bottom-auto sm:top-0 sm:pt-4"
>
  <div
    class="flex h-10 items-center gap-0.5 rounded-full border border-white/10 bg-white/5 px-1.5 shadow-lg backdrop-blur-md transition-all duration-300 sm:h-12 sm:gap-1 sm:px-2"
  >
    @for (item of navigationItems; track item) {
      <a
        [routerLink]="item.path"
        routerLinkActive="text-white bg-white/15"
        class="flex items-center gap-1 rounded-full px-2.5 py-1 text-xs font-medium text-white/60 transition-all duration-300 hover:bg-white/10 hover:text-white sm:gap-1.5 sm:px-3 sm:py-1.5 sm:text-sm"
      >
        <lucide-angular [img]="this[item.icon]" class="h-3.5 w-3.5 sm:h-4 sm:w-4"></lucide-angular>
        <span>{{ item.label }}</span>
      </a>
    }

    <div class="mx-1.5 h-5 w-px bg-white/15 sm:hidden"></div>

    <div class="flex items-center gap-2 sm:hidden">
      <a
        href="https://www.linkedin.com/in/kennytalbi"
        target="_blank"
        rel="noopener noreferrer"
        class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-[#0077b5] text-white transition-all duration-300 hover:brightness-110"
      >
        <lucide-angular [img]="LinkedinIcon" [size]="14"></lucide-angular>
      </a>
      <a
        href="https://github.com/kbntx"
        target="_blank"
        rel="noopener noreferrer"
        class="flex h-7 w-7 shrink-0 items-center justify-center rounded-full bg-[#333] text-white transition-all duration-300 hover:brightness-125"
      >
        <lucide-angular [img]="GithubIcon" [size]="14"></lucide-angular>
      </a>
    </div>
  </div>
</nav>

<div class="hidden h-16 sm:block"></div>
