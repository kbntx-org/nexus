backup:
  enabled: false

postgresCluster:
  storageClass: standard

victoria-metrics-single:
  server:
    statefulSet:
      spec:
        persistentVolumeClaimRetentionPolicy:
          whenDeleted: Delete
          whenScaled: Delete

externalSecrets:
  vaultServer: http://vault.default.svc.cluster.local:8200
  vaultPath: dev
  vaultRole: admin

ingress:
  grafanaHost: grafana.localhost
  prometheusHost: prometheus.localhost

grafana:
  grafana.ini:
    server:
      domain: grafana.localhost
      root_url: 'http://%(domain)s/'
    auth:
      disable_login: false
      disable_login_form: false
  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: VictoriaMetrics
          type: prometheus
          url: http://monitoring-victoria-metrics-single-server:8428
          access: proxy
          isDefault: true
        - name: Loki
          type: loki
          url: http://monitoring-loki-gateway
          access: proxy

loki:
  deploymentMode: SingleBinary
  singleBinary:
    replicas: 1
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0
  global:
    extraEnv: []
    extraArgs: []
  lokiCanary:
    enabled: false
  test:
    enabled: false
  loki:
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    compactor:
      delete_request_store: filesystem
