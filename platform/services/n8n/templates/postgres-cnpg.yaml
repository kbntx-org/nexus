apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: n8n-postgres-cnpg
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system

  storage:
    size: 15Gi
    storageClass: {{ .Values.postgresCluster.storageClass | quote }}

  enableSuperuserAccess: true
  superuserSecret:
    name: n8n-postgres-cnpg-app
  bootstrap:
    initdb:
      database: n8n
      owner: postgres
{{- if .Values.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath | quote }}
      endpointURL: {{ .Values.backup.endpointURL | quote }}
      s3Credentials:
        accessKeyId:
          name: n8n-secret
          key: backupAccessKeyId
        secretAccessKey:
          name: n8n-secret
          key: backupSecretAccessKey
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: 4d
{{- end }}
{{- if .Values.backup.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: n8n-postgres-cnpg-daily
spec:
  schedule: "0 0 6 * * *"
  backupOwnerReference: self
  cluster:
    name: n8n-postgres-cnpg
{{- end }}
