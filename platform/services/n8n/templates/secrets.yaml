apiVersion: v1
kind: ServiceAccount
metadata:
  name: n8n-secret-sa
automountServiceAccountToken: false
---
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: n8n-secret-store
spec:
  provider:
    vault:
      auth:
        kubernetes:
          mountPath: kubernetes
          role: n8n
          serviceAccountRef:
            name: n8n-secret-sa
            audiences:
              - vault
      path: platform
      server: https://vault.kbntx.com
      version: v2
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: n8n-secret
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: n8n-secret-store
    kind: SecretStore
  target:
    name: n8n-secret
  dataFrom:
    - extract:
        key: n8n
