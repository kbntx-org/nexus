argocd-apps:
  applications:
    traefik-ingress:
      project: default
      source:
        repoURL: https://github.com/kbntx-org/nexus.git
        path: platform/core/traefik
        targetRevision: main
      destination:
        server: https://kubernetes.default.svc
        namespace: traefik-ingress
      syncPolicy:
        syncOptions:
          - CreateNamespace=true

    argocd:
      project: default
      source:
