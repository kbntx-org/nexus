victoria-metrics-single:
  server:
    scrape:
      enabled: true
      extraScrapeConfigs:
        - job_name: node-exporter
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_container_name]
              regex: node-exporter
              action: keep
            - source_labels: [__meta_kubernetes_pod_node_name]
              target_label: node
        - job_name: kube-state-metrics
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_container_name]
              regex: kube-state-metrics
              action: keep
            - source_labels: [__meta_kubernetes_pod_container_port_number]
              regex: '8080'
              action: keep

grafana:
  admin:
    existingSecret: monitoring-secret
    userKey: grafanaUser
    passwordKey: grafanaPassword
  envValueFrom:
    POSTGRES_USER:
      secretKeyRef:
        name: monitoring-secret
        key: postgresUser
    POSTGRES_PASSWORD:
      secretKeyRef:
        name: monitoring-secret
        key: postgresPassword
  grafana.ini:
    server:
      domain: grafana.kbntx.com
      root_url: 'https://%(domain)s/'
    auth:
      disable_login: true
      disable_login_form: true
    database:
      type: postgres
      host: postgres:5432
      name: grafana
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      ssl_mode: disable

  persistence:
    enabled: false
  sidecar:
    dashboards:
      provider:
        allowUiUpdates: true

loki:
  global:
    extraArgs:
      - -config.expand-env=true
    extraEnv:
      - name: S3_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: monitoring-secret
            key: lokiAccessKeyId
      - name: S3_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: monitoring-secret
            key: lokiSecretAccessKey
      - name: S3_ENDPOINT
        valueFrom:
          secretKeyRef:
            name: monitoring-secret
            key: lokiEndpoint
      - name: CHUNKS_BUCKET_NAME
        valueFrom:
          secretKeyRef:
            name: monitoring-secret
            key: lokiBucketName
  chunksCache:
    enabled: false
  loki:
    schemaConfig:
      configs:
        - from: 2024-04-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    limits_config:
      retention_period: 360h
    compactor:
      retention_enabled: true
      retention_delete_delay: 1h
      delete_request_store: s3
    ingester:
      chunk_encoding: snappy
    auth_enabled: false
    tracing:
      enabled: true
    querier:
      max_concurrent: 4
    storage:
      type: s3
      bucketNames:
        chunks: ${CHUNKS_BUCKET_NAME}
      s3:
        endpoint: ${S3_ENDPOINT}
        region: eu-central-1
        secretAccessKey: ${S3_SECRET_ACCESS_KEY}
        accessKeyId: ${S3_ACCESS_KEY_ID}
        s3ForcePathStyle: false
        insecure: false

  deploymentMode: SimpleScalable
  backend:
    replicas: 3
  read:
    replicas: 3
  write:
    replicas: 3
  minio:
    enabled: false
  ruler:
    enabled: false

promtail:
  config:
    clients:
      - url: http://monitoring-loki-gateway/loki/api/v1/push
        tenant_id: 1
    snippets:
      extraRelabelConfigs:
        - action: replace
          source_labels: [__meta_kubernetes_pod_controller_kind]
          target_label: kind_name
        - action: replace
          source_labels: [__meta_kubernetes_pod_controller_name]
          target_label: controller_name
