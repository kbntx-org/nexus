apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-supavisor
  labels:
    app: supabase-supavisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-supavisor
  template:
    metadata:
      labels:
        app: supabase-supavisor
    spec:
      volumes:
        - name: supavisor-pooler-config
          configMap:
            name: supavisor-pooler-config
      containers:
        - name: supavisor
          image: supabase/supavisor:2.5.7
          ports:
            - containerPort: 5432   # main Postgres proxy
            - containerPort: 6543   # transaction pooler
          env:
            - name: PORT
              value: "4000"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbName
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbPassword
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: dbUrlEcto

            - name: CLUSTER_POSTGRES
              value: "true"
            - name: SECRET_KEY_BASE
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: secretKeyBase
            - name: VAULT_ENC_KEY
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: vaultEncryptionKey

            - name: API_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwtSecret
            - name: METRICS_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: supabase-secrets
                  key: jwtSecret

            - name: REGION
              value: "local"
            - name: ERL_AFLAGS
              value: "-proto_dist inet_tcp"

            - name: POOLER_TENANT_ID
              value: "default"
            - name: POOLER_DEFAULT_POOL_SIZE
              value: "20"
            - name: POOLER_MAX_CLIENT_CONN
              value: "100"
            - name: POOLER_POOL_MODE
              value: "transaction"
            - name: DB_POOL_SIZE
              value: "20"
          volumeMounts:
            - name: supavisor-pooler-config
              mountPath: /etc/pooler/pooler.exs
              subPath: pooler.exs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5

---
apiVersion: v1
kind: Service
metadata:
  name: supabase-supavisor
  labels:
    app: supabase-supavisor
spec:
  selector:
    app: supabase-supavisor
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
    - name: pooler
      port: 6543
      targetPort: 6543
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: supavisor-pooler-config
data:
  pooler.exs: |
    {:ok, _} = Application.ensure_all_started(:supavisor)
    {:ok, version} =
      case Supavisor.Repo.query!("select version()") do
        %{rows: [[ver]]} -> Supavisor.Helpers.parse_pg_version(ver)
        _ -> nil
      end

    params = %{
      "external_id" => System.get_env("POOLER_TENANT_ID"),
      "db_host" => "db",
      "db_port" => System.get_env("POSTGRES_PORT"),
      "db_database" => System.get_env("POSTGRES_DB"),
      "require_user" => false,
      "auth_query" => "SELECT * FROM pgbouncer.get_auth($1)",
      "default_max_clients" => System.get_env("POOLER_MAX_CLIENT_CONN"),
      "default_pool_size" => System.get_env("POOLER_DEFAULT_POOL_SIZE"),
      "default_parameter_status" => %{"server_version" => version},
      "users" => [%{
        "db_user" => "pgbouncer",
        "db_password" => System.get_env("POSTGRES_PASSWORD"),
        "mode_type" => System.get_env("POOLER_POOL_MODE"),
        "pool_size" => System.get_env("POOLER_DEFAULT_POOL_SIZE"),
        "is_manager" => true
      }]
    }

    if !Supavisor.Tenants.get_tenant_by_external_id(params["external_id"]) do
      {:ok, _} = Supavisor.Tenants.create_tenant(params)
    end
