apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: appsmith-ingress
spec:
  rules:
    - host: appsmith.kbntx.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: appsmith-service
                port:
                  number: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: appsmith
spec:
  replicas: 1
  selector:
    matchLabels:
      app: appsmith
  template:
    metadata:
      labels:
        app: appsmith
    spec:
      containers:
        - name: appsmith
          image: appsmith/appsmith-ce:v1.94
          ports:
            - containerPort: 80
          env:
            - name: APPSMITH_ENABLE_EMBEDDED_DB
              value: "0"
            - name: APPSMITH_SIGNUP_DISABLED
              value: "true"
            - name: APPSMITH_FORM_LOGIN_DISABLED
              value: "true"
            - name: APPSMITH_OAUTH2_GITHUB_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: appsmith-secret
                  key: githubClientId
            - name: APPSMITH_OAUTH2_GITHUB_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: appsmith-secret
                  key: githubClientSecret
            - name: APPSMITH_ADMIN_EMAILS
              valueFrom:
                secretKeyRef:
                  name: appsmith-secret
                  key: adminEmails
            - name: APPSMITH_MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: appsmith-secret
                  key: mongoDbUrl
            - name: APPSMITH_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: appsmith-secret
                  key: redisDbUrl
            - name: APPSMITH_ENCRYPTION_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: appsmith-secret
                  key: encryptionPassword
            - name: APPSMITH_ENCRYPTION_SALT
              valueFrom:
                secretKeyRef:
                  name: appsmith-secret
                  key: encryptionSalt
            - name: APPSMITH_DISABLE_TELEMETRY
              value: "true"
            - name: APPSMITH_CLOUD_SERVICES_BASE_URL
              value: ""
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: appsmith-service
spec:
  selector:
    app: appsmith
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: ClusterIP

