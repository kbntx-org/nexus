apiVersion: v1
kind: Service
metadata:
  name: traefik-api-service
spec:
  selector:
    app.kubernetes.io/name: traefik
  ports:
    - port: 8080
      name: traefik
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traefik-dashboard-ingress
spec:
  ingressClassName: traefik
  rules:
    - host: {{ .Values.dashboardHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: traefik-api-service
                port:
                  name: traefik
