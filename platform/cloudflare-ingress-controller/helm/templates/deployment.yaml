apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ingress-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflare-ingress-controller
  template:
    metadata:
      labels:
        app: cloudflare-ingress-controller
    spec:
      serviceAccountName: cloudflare-ingress-controller
      containers:
        - name: controller
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: TARGET_SERVICE_URL
              value: {{ .Values.targetServiceUrl | quote }}
            - name: INGRESS_CLASS_NAME
              value: {{ .Values.ingressClassName | quote }}
            - name: RECONCILE_INTERVAL_MS
              value: {{ .Values.reconcileIntervalMs | quote }}
            - name: CF_TUNNEL_NAME_PREFIX
              value: {{ .Values.tunnelNamePrefix | quote }}
            - name: CLOUDFLARED_IMAGE
              value: {{ .Values.cloudflared.image | quote }}
            - name: CLOUDFLARED_REPLICAS
              value: {{ .Values.cloudflared.replicas | quote }}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
