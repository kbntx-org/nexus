image:
  repository: kbntx/cloudflare-ingress-controller
  tag: latest
  pullPolicy: Always

# URL of the backend service that ingress traffic is forwarded to.
# e.g. http://traefik.traefik.svc.cluster.local:80
targetServiceUrl: ''

# Only process ingresses with this ingressClassName.
# Leave empty to watch all ingresses regardless of class.
ingressClassName: ''

# Reconciliation interval in milliseconds.
reconcileIntervalMs: 30000

# Prefix applied to all Cloudflare Tunnel names managed by this controller.
# Tunnels are named "{tunnelNamePrefix}-{annotation value}".
# The controller only touches tunnels whose names start with this prefix.
tunnelNamePrefix: 'k8s'

# cloudflared settings — one Deployment per unique tunnel annotation value.
cloudflared:
  # Image used for cloudflared Deployments.
  image: 'cloudflare/cloudflared:2025.5.0'
  # Number of replicas per cloudflared Deployment.
  replicas: 2

# Additional env vars injected into the controller container.
# Use this to provide CF_API_TOKEN, CF_ACCOUNT_ID, CF_ZONE_ID
# from your own secret(s), using standard Kubernetes env syntax.
#
# Example:
#   extraEnv:
#     - name: CF_API_TOKEN
#       valueFrom:
#         secretKeyRef:
#           name: my-cloudflare-secret
#           key: apiToken
#     - name: CF_ACCOUNT_ID
#       valueFrom:
#         secretKeyRef:
#           name: my-cloudflare-secret
#           key: accountId
#     - name: CF_ZONE_ID
#       valueFrom:
#         secretKeyRef:
#           name: my-cloudflare-secret
#           key: zoneId
extraEnv: []
