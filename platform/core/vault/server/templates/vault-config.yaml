apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-config
data:
  config.hcl: |
    ui = true

    {{- if .Values.dev }}
    storage "inmem" {}
    {{- else }}
    storage "postgresql" {
      connection_url = "${VAULT_POSTGRES_CONNECTION_URI}"
    }

    listener "tcp" {
      address     = "0.0.0.0:8200"
      tls_disable = true

      telemetry {
        unauthenticated_metrics_access = true
      }
    }
    {{- end }}

    telemetry {
      prometheus_retention_time = "30s"
      disable_hostname          = true
    }

    log_level  = "info"
    log_format = "json"
