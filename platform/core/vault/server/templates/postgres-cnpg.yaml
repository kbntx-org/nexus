{{- if not .Values.dev }}
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: vault-postgres-cnpg
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3-system-trixie

  storage:
    size: 10Gi
    storageClass: {{ .Values.postgresCluster.storageClass | quote }}

  enableSuperuserAccess: true
  superuserSecret:
    name: vault-postgres-credentials
  bootstrap:
    initdb:
      database: vault
      postInitApplicationSQLRefs:
        configMapRefs:
          - name: vault-postgres-init
            key: vault.sql
{{- if .Values.backup.enabled }}
  backup:
    barmanObjectStore:
      destinationPath: {{ .Values.backup.destinationPath | quote }}
      endpointURL: {{ .Values.backup.endpointURL | quote }}
      s3Credentials:
        accessKeyId:
          name: vault-secret
          key: backupAccessKeyId
        secretAccessKey:
          name: vault-secret
          key: backupSecretAccessKey
      wal:
        compression: gzip
      data:
        compression: gzip
    retentionPolicy: 4d
{{- end }}
{{- if .Values.backup.enabled }}
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: vault-postgres-cnpg-daily
spec:
  schedule: "0 0 6 * * *"
  backupOwnerReference: self
  cluster:
    name: vault-postgres-cnpg
{{- end }}
{{- end }}
