apiVersion: v1
kind: ServiceAccount
metadata:
  name: cf-ingress-controller
automountServiceAccountToken: true
---
# ClusterRole: read Ingresses across all namespaces
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cf-ingress-controller
rules:
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cf-ingress-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cf-ingress-controller
subjects:
  - kind: ServiceAccount
    name: cf-ingress-controller
    namespace: {{ .Release.Namespace }}
---
# Role: manage Leases for leader election (namespace-scoped)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cf-ingress-controller-leader-election
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cf-ingress-controller-leader-election
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cf-ingress-controller-leader-election
subjects:
  - kind: ServiceAccount
    name: cf-ingress-controller
    namespace: {{ .Release.Namespace }}
